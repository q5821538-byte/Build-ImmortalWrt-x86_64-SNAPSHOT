name: Build ImmortalWrt x86_64 SNAPSHOT R3-4300U PassWall Nikki

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: read

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TZ: Asia/Shanghai
  GIT_TERMINAL_PROMPT: 0

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Cleanup disk
        run: |
          set -e
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          docker system prune -a -f || true
          df -h

      - name: Install dependencies
        run: |
          set -e
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3 python3-setuptools \
            rsync swig unzip zlib1g-dev file wget curl libelf-dev \
            libtool automake autoconf autopoint pkg-config ccache \
            asciidoc binutils bzip2 genisoimage libglib2.0-dev \
            libxml2-dev libzstd-dev patch python3-pip qemu-utils \
            xsltproc zstd

          for pkg in fastjar upx-ucl; do
            sudo apt install -y "$pkg" || echo "Optional dependency $pkg not available, continue"
          done

      - name: Add swap safe mode
        run: |
          set +e
          echo "Swap before:"
          swapon --show || true
          free -h || true
          df -h / /mnt || true

          SWAPFILE="/mnt/swapfile-${GITHUB_RUN_ID}"
          sudo swapoff "$SWAPFILE" 2>/dev/null || true
          sudo rm -f "$SWAPFILE" || true

          echo "Creating swap at $SWAPFILE"
          sudo fallocate -l 8G "$SWAPFILE"
          FALL_RESULT=$?
          if [ "$FALL_RESULT" -ne 0 ]; then
            echo "fallocate failed, trying dd fallback"
            sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=8192 status=progress
          fi

          if [ -f "$SWAPFILE" ]; then
            sudo chmod 600 "$SWAPFILE" || true
            sudo mkswap "$SWAPFILE" || true
            sudo swapon "$SWAPFILE" || true
          fi

          echo "Swap after:"
          swapon --show || true
          free -h || true
          exit 0

      - name: Clone ImmortalWrt source
        run: |
          set -e
          retry() {
            local max=3
            local n=1
            until "$@"; do
              if [ "$n" -ge "$max" ]; then
                echo "Command failed after $max attempts: $*"
                return 1
              fi
              echo "Command failed: $*"
              echo "Retrying in $((n * 20)) seconds..."
              sleep $((n * 20))
              n=$((n + 1))
            done
          }
          retry git clone --depth=1 -b "$REPO_BRANCH" "$REPO_URL" immortalwrt

      - name: Add PassWall and Nikki feeds
        working-directory: immortalwrt
        run: |
          set -e

          git config --global http.version HTTP/1.1 || true
          git config --global http.postBuffer 524288000 || true
          git config --global url."https://github.com/".insteadOf git://github.com/ || true

          retry() {
            local max=3
            local n=1
            until "$@"; do
              if [ "$n" -ge "$max" ]; then
                echo "Command failed after $max attempts: $*"
                return 1
              fi
              echo "Command failed: $*"
              echo "Retrying in $((n * 20)) seconds..."
              sleep $((n * 20))
              n=$((n + 1))
            done
          }

          retry git ls-remote --heads https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git main
          retry git ls-remote --heads https://github.com/Openwrt-Passwall/openwrt-passwall.git main

          retry git ls-remote --heads https://github.com/nikkinikki-org/OpenWrt-nikki.git main

          cat > /tmp/custom-feeds.conf <<'EOF_CUSTOM_FEEDS'
          src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main
          src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main
          src-git nikki https://github.com/nikkinikki-org/OpenWrt-nikki.git;main
          EOF_CUSTOM_FEEDS
          sed -i 's/^          //' /tmp/custom-feeds.conf

          cp feeds.conf.default feeds.conf.default.bak
          # video feed is not needed for this x86 router build.
          # Excluding it avoids the current sdl3/libwayland feed warning and cuts a lot of useless log output.
          grep -v -E 'openwrt-passwall|OpenWrt-nikki|^[[:space:]]*src-git[[:space:]]+(nikki|video)[[:space:]]' feeds.conf.default.bak > feeds.conf.default.clean
          cat /tmp/custom-feeds.conf feeds.conf.default.clean > feeds.conf.default

          echo "PassWall and Nikki feeds added:"
          head -n 10 feeds.conf.default

      - name: Update and install feeds safe mode
        working-directory: immortalwrt
        run: |
          set -e

          retry() {
            local max=3
            local n=1
            until "$@"; do
              if [ "$n" -ge "$max" ]; then
                echo "Command failed after $max attempts: $*"
                return 1
              fi
              echo "Command failed: $*"
              echo "Retrying in $((n * 20)) seconds..."
              sleep $((n * 20))
              n=$((n + 1))
            done
          }

          echo "Updating feeds..."
          retry ./scripts/feeds update -a || {
            echo "Feeds update failed, cleaning feed cache and retrying once..."
            ./scripts/feeds clean || true
            rm -rf tmp/feeds* tmp/info/.files-* || true
            ./scripts/feeds update -a
          }

          echo "Removing possible old/conflicting PassWall packages from default feeds..."
          rm -rf feeds/luci/applications/luci-app-passwall || true
          rm -rf feeds/packages/net/xray-core || true
          rm -rf feeds/packages/net/v2ray-geodata || true
          rm -rf feeds/packages/net/sing-box || true
          rm -rf feeds/packages/net/chinadns-ng || true
          rm -rf feeds/packages/net/dns2socks || true
          rm -rf feeds/packages/net/hysteria || true
          rm -rf feeds/packages/net/ipt2socks || true
          rm -rf feeds/packages/net/microsocks || true
          rm -rf feeds/packages/net/naiveproxy || true
          rm -rf feeds/packages/net/shadowsocks-rust || true
          rm -rf feeds/packages/net/shadowsocksr-libev || true
          rm -rf feeds/packages/net/simple-obfs || true
          rm -rf feeds/packages/net/tcping || true
          rm -rf feeds/packages/net/v2ray-plugin || true
          rm -rf feeds/packages/net/xray-plugin || true
          rm -rf feeds/packages/net/geoview || true
          rm -rf feeds/packages/net/shadow-tls || true

          echo "Installing only required feed packages..."
          # Do not use './scripts/feeds install -a' here:
          # - it links thousands of unrelated packages and makes GitHub logs huge;
          # - the video/sdl3 feed can currently warn about a missing libwayland build dependency;
          # - this build only needs LuCI, PassWall, Nikki, and router utility packages.
          FEED_PACKAGES="
          luci
          luci-ssl-openssl
          luci-app-package-manager
          luci-app-firewall
          luci-app-ttyd
          luci-app-filemanager
          luci-i18n-base-zh-cn
          luci-i18n-firewall-zh-cn
          luci-i18n-package-manager-zh-cn
          luci-i18n-ttyd-zh-cn
          luci-i18n-filemanager-zh-cn
          openssh-sftp-server
          yq
          curl
          ip-full
          ethtool
          pciutils
          irqbalance
          lm-sensors
          block-mount
          lsblk
          fdisk
          parted
          "
          for pkg in $FEED_PACKAGES; do
            ./scripts/feeds install "$pkg" || echo "::warning::Feed package skipped or already built-in: ${pkg}"
          done

          echo "Force installing required custom-feed package links..."
          ./scripts/feeds install -f -p nikki nikki luci-app-nikki
          ./scripts/feeds install -f -p nikki luci-i18n-nikki-zh-cn || echo "::warning::luci-i18n-nikki-zh-cn has no standalone feed link; defconfig/boot fallback will handle it."
          ./scripts/feeds install -f -p passwall_luci luci-app-passwall luci-i18n-passwall-zh-cn || true
          ./scripts/feeds install -f -p passwall_packages xray-core sing-box chinadns-ng dns2socks tcping v2ray-geodata geoview || true

          echo "Checking required package links..."
          require_link() {
            if [ ! -e "$1" ]; then
              echo "::error::Required feed package link missing: $1"
              exit 1
            fi
          }
          require_link package/feeds/nikki/nikki
          require_link package/feeds/nikki/luci-app-nikki
          require_link package/feeds/passwall_luci/luci-app-passwall

          # luci-i18n-* packages are often generated by LuCI build metadata and may not have a
          # package/feeds/... symlink. Do not fail here because of a missing i18n symlink.
          echo "Nikki/PassWall required feed links are OK."

          # Do not remove custom feed entries before make defconfig/build.
          # Runtime APK repositories are fixed by /etc/uci-defaults/98-fix-apk-repositories instead,
          # so build-time feeds can still generate every package, including luci-i18n-nikki-zh-cn when available.

      - name: Generate final x86_64 config for R3 4300U
        working-directory: immortalwrt
        run: |
          set -e

          mkdir -p files/etc/config
          mkdir -p files/etc/uci-defaults
          mkdir -p files/etc/sysctl.d
          mkdir -p files/etc/apk/repositories.d

          # Runtime APK repositories: keep only official ImmortalWrt snapshot repos.
          # PassWall feeds are used only at build time; do not leave them as runtime repos.
          cat > files/etc/apk/repositories <<'EOF_REPOS'
          # This file is auto-generated and build-specific, any changes will be intentionally lost in sysupgrade.
          # Add your custom feeds to /etc/apk/repositories.d/customfeeds.list
          https://downloads.immortalwrt.org/snapshots/targets/x86/64/packages/packages.adb
          https://downloads.immortalwrt.org/snapshots/packages/x86_64/base/packages.adb
          https://downloads.immortalwrt.org/snapshots/packages/x86_64/luci/packages.adb
          https://downloads.immortalwrt.org/snapshots/packages/x86_64/packages/packages.adb
          https://downloads.immortalwrt.org/snapshots/packages/x86_64/routing/packages.adb
          https://downloads.immortalwrt.org/snapshots/packages/x86_64/telephony/packages.adb
          EOF_REPOS
          sed -i 's/^          //' files/etc/apk/repositories

          : > files/etc/apk/repositories.d/customfeeds.list

          cat > files/etc/config/network <<'EOF_NET'
          config interface 'loopback'
                  option device 'lo'
                  option proto 'static'
                  option ipaddr '127.0.0.1'
                  option netmask '255.0.0.0'

          config globals 'globals'

          config device
                  option name 'br-lan'
                  option type 'bridge'
                  list ports 'eth0'

          config interface 'lan'
                  option device 'br-lan'
                  option proto 'static'
                  option ipaddr '192.168.1.1'
                  option netmask '255.255.255.0'
                  option ip6assign '60'

          config interface 'wan'
                  option device 'eth1'
                  option proto 'dhcp'

          config interface 'wan6'
                  option device 'eth1'
                  option proto 'dhcpv6'
          EOF_NET
          sed -i 's/^          //' files/etc/config/network

          cat > files/etc/uci-defaults/98-fix-apk-repositories <<'EOF_APK'
          #!/bin/sh

          # PassWall feeds are build-time feeds. They must not stay in runtime APK repos,
          # otherwise apk/LuCI package update will request non-existent official indexes:
          # passwall_luci/packages.adb and passwall_packages/packages.adb.

          mkdir -p /etc/apk/repositories.d

          cat > /etc/apk/repositories <<'EOF_REPOS_BOOT'
          # This file is auto-generated and build-specific, any changes will be intentionally lost in sysupgrade.
          # Add your custom feeds to /etc/apk/repositories.d/customfeeds.list
          https://downloads.immortalwrt.org/snapshots/targets/x86/64/packages/packages.adb
          https://downloads.immortalwrt.org/snapshots/packages/x86_64/base/packages.adb
          https://downloads.immortalwrt.org/snapshots/packages/x86_64/luci/packages.adb
          https://downloads.immortalwrt.org/snapshots/packages/x86_64/packages/packages.adb
          https://downloads.immortalwrt.org/snapshots/packages/x86_64/routing/packages.adb
          https://downloads.immortalwrt.org/snapshots/packages/x86_64/telephony/packages.adb
          EOF_REPOS_BOOT

          : > /etc/apk/repositories.d/customfeeds.list

          for f in /etc/apk/repositories /etc/apk/repositories.d/*.list /etc/apk/repositories.d/*.repositories; do
            [ -f "$f" ] || continue
            sed -i \
              -e '\|/snapshots/packages/x86_64/video|d' \
              -e '\|/snapshots/packages/x86_64/passwall_luci|d' \
              -e '\|/snapshots/packages/x86_64/passwall_packages|d' \
              -e '\|/snapshots/packages/.*/passwall_luci|d' \
              -e '\|/snapshots/packages/.*/passwall_packages|d' \
              "$f"
          done

          rm -rf /var/cache/apk/* /tmp/apk-cache/* 2>/dev/null || true
          exit 0
          EOF_APK
          sed -i 's/^          //' files/etc/uci-defaults/98-fix-apk-repositories
          chmod +x files/etc/uci-defaults/98-fix-apk-repositories

          cat > files/etc/uci-defaults/99-r3-4300u-defaults <<'EOF_DEFAULTS'
          #!/bin/sh

          uci -q batch <<'UCI'
          set system.@system[0].hostname='ImmortalWrt'
          set system.@system[0].zonename='Asia/Shanghai'
          set system.@system[0].timezone='CST-8'
          commit system

          set network.lan.device='br-lan'
          set network.wan.device='eth1'
          set network.wan.proto='dhcp'
          set network.wan6.device='eth1'
          set network.wan6.proto='dhcpv6'
          commit network

          set firewall.@defaults[0].flow_offloading='1'
          set firewall.@defaults[0].flow_offloading_hw='1'
          commit firewall
          UCI

          uci -q get luci.main >/dev/null 2>&1 || uci set luci.main='core'
          uci -q set luci.main.lang='zh-cn'
          uci -q commit luci

          exit 0
          EOF_DEFAULTS
          sed -i 's/^          //' files/etc/uci-defaults/99-r3-4300u-defaults
          chmod +x files/etc/uci-defaults/99-r3-4300u-defaults

          mkdir -p files/etc/init.d files/etc/rc.d
          cat > files/etc/init.d/nikki-i18n-fix <<'EOF_NIKKI_I18N_FIX'
          #!/bin/sh /etc/rc.common

          START=99

          boot() {
            (
              sleep 45

              command -v apk >/dev/null 2>&1 || exit 0
              apk info luci-i18n-nikki-zh-cn >/dev/null 2>&1 && exit 0

              . /etc/openwrt_release 2>/dev/null || true
              arch="${DISTRIB_ARCH:-x86_64}"
              case "${DISTRIB_RELEASE:-SNAPSHOT}" in
                *"24.10"*) branch="openwrt-24.10" ;;
                *"25.12"*) branch="openwrt-25.12" ;;
                "SNAPSHOT"|*) branch="SNAPSHOT" ;;
              esac

              feed_url="https://nikkinikki.pages.dev/${branch}/${arch}/nikki"
              mkdir -p /etc/apk/keys
              wget -q -O /etc/apk/keys/nikki.pem https://nikkinikki.pages.dev/public-key.pem || true

              apk update || true

              # Official ImmortalWrt LuCI Chinese packages. These come from the normal snapshot repos.
              apk add \
                luci-i18n-base-zh-cn \
                luci-i18n-firewall-zh-cn \
                luci-i18n-package-manager-zh-cn \
                luci-i18n-ttyd-zh-cn \
                luci-i18n-filemanager-zh-cn \
                2>/dev/null || true

              # Nikki Chinese package comes from the Nikki APK feed when it was not embedded at build time.
              apk add --allow-untrusted -X "${feed_url}/packages.adb" luci-i18n-nikki-zh-cn || true

              rm -rf /tmp/luci-indexcache /tmp/luci-modulecache 2>/dev/null || true
              /etc/init.d/uhttpd restart >/dev/null 2>&1 || true

              if apk info luci-i18n-nikki-zh-cn >/dev/null 2>&1; then
                /etc/init.d/nikki-i18n-fix disable >/dev/null 2>&1 || true
              fi
            ) &
          }
          EOF_NIKKI_I18N_FIX
          sed -i 's/^          //' files/etc/init.d/nikki-i18n-fix
          chmod +x files/etc/init.d/nikki-i18n-fix
          ln -sf ../init.d/nikki-i18n-fix files/etc/rc.d/S99nikki-i18n-fix

          echo "Embedding stable Mihomo core for Nikki..."
          mkdir -p files/usr/bin

          MIHOMO_JSON="$(curl -fsSL --retry 3 --retry-delay 5 https://api.github.com/repos/MetaCubeX/mihomo/releases/latest)"
          printf '%s' "$MIHOMO_JSON" > /tmp/mihomo_release.json
          MIHOMO_TAG="$(python3 -c 'import json; print(json.load(open("/tmp/mihomo_release.json"))["tag_name"])')"
          MIHOMO_URL="$(python3 <<'PY_MIHOMO'
          import json
          import re

          data = json.load(open("/tmp/mihomo_release.json"))
          tag = data.get("tag_name", "")
          assets = data.get("assets", [])

          # R3 4300U is x86_64. Use amd64-v1 first for maximum compatibility/stability.
          patterns = [
              rf"^mihomo-linux-amd64-v1-{re.escape(tag)}\.gz$",
              rf"^mihomo-linux-amd64-compatible-{re.escape(tag)}\.gz$",
              rf"^mihomo-linux-amd64-{re.escape(tag)}\.gz$",
              r"^mihomo-linux-amd64-v1-.*\.gz$",
              r"^mihomo-linux-amd64-compatible-.*\.gz$",
              r"^mihomo-linux-amd64-.*\.gz$",
          ]

          for pattern in patterns:
              for asset in assets:
                  name = asset.get("name", "")
                  url = asset.get("browser_download_url", "")
                  if re.match(pattern, name) and url:
                      print(url)
                      raise SystemExit(0)

          print("", end="")
          PY_MIHOMO
          )"
          if [ -z "$MIHOMO_URL" ]; then
            echo "::error::Could not find a stable Mihomo linux amd64 asset in latest release ${MIHOMO_TAG}."
            echo "Available assets:"
            python3 -c 'import json; [print(a.get("name","")) for a in json.load(open("/tmp/mihomo_release.json")).get("assets", [])]'
            exit 1
          fi

          echo "Using stable Mihomo core: ${MIHOMO_TAG}"
          echo "Download URL: ${MIHOMO_URL}"
          curl -fL --retry 3 --retry-delay 5 -o /tmp/mihomo.gz "$MIHOMO_URL"
          gzip -dc /tmp/mihomo.gz > files/usr/bin/mihomo
          chmod 0755 files/usr/bin/mihomo
          file files/usr/bin/mihomo || true
          files/usr/bin/mihomo -v || true


          cat > files/etc/sysctl.d/99-r3-4300u.conf <<'EOF_SYSCTL'
          net.core.default_qdisc=fq_codel
          EOF_SYSCTL
          sed -i 's/^          //' files/etc/sysctl.d/99-r3-4300u.conf

          cat > .config <<'EOF_CONFIG'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y

          CONFIG_GRUB_IMAGES=y
          CONFIG_GRUB_EFI_IMAGES=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_TARGET_KERNEL_PARTSIZE=128

          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl-openssl=y
          CONFIG_LUCI_LANG_zh_Hans=y
          CONFIG_PACKAGE_luci-app-package-manager=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-filemanager=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-package-manager-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-filemanager-zh-cn=y
          CONFIG_PACKAGE_openssh-sftp-server=y

          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y
          CONFIG_PACKAGE_xray-core=y
          CONFIG_PACKAGE_sing-box=y
          CONFIG_PACKAGE_chinadns-ng=y
          CONFIG_PACKAGE_dns2socks=y
          CONFIG_PACKAGE_tcping=y
          CONFIG_PACKAGE_v2ray-geodata=y
          CONFIG_PACKAGE_geoview=y

          CONFIG_PACKAGE_nikki=y
          CONFIG_PACKAGE_luci-app-nikki=y
          CONFIG_PACKAGE_luci-i18n-nikki-zh-cn=y
          CONFIG_PACKAGE_yq=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_kmod-dummy=y
          CONFIG_PACKAGE_kmod-inet-diag=y
          CONFIG_PACKAGE_kmod-nft-socket=y
          CONFIG_PACKAGE_kmod-nft-tproxy=y
          CONFIG_PACKAGE_kmod-tun=y

          CONFIG_PACKAGE_kmod-igc=y
          CONFIG_PACKAGE_ethtool=y
          CONFIG_PACKAGE_pciutils=y
          CONFIG_PACKAGE_irqbalance=y

          CONFIG_PACKAGE_autocore=y
          CONFIG_PACKAGE_lm-sensors=y
          CONFIG_PACKAGE_kmod-hwmon-k10temp=y

          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_lsblk=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_parted=y

          # CONFIG_PACKAGE_luci-app-openclash is not set
          # CONFIG_PACKAGE_luci-app-passwall2 is not set
          # CONFIG_PACKAGE_luci-app-ssr-plus is not set
          EOF_CONFIG
          sed -i 's/^          //' .config

          make defconfig

          grep -q '^CONFIG_TARGET_ROOTFS_PARTSIZE=' .config && \
            sed -i 's/^CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=1024/' .config || \
            echo 'CONFIG_TARGET_ROOTFS_PARTSIZE=1024' >> .config

          grep -q '^CONFIG_TARGET_KERNEL_PARTSIZE=' .config && \
            sed -i 's/^CONFIG_TARGET_KERNEL_PARTSIZE=.*/CONFIG_TARGET_KERNEL_PARTSIZE=128/' .config || \
            echo 'CONFIG_TARGET_KERNEL_PARTSIZE=128' >> .config

          make defconfig

          echo "Checking required packages after defconfig..."
          REQUIRED_PACKAGES="
          luci
          luci-ssl-openssl
          luci-app-nikki
          nikki
          luci-app-passwall
          kmod-dummy
          kmod-tun
          kmod-nft-socket
          kmod-nft-tproxy
          kmod-inet-diag
          "
          MISSING=0
          for pkg in $REQUIRED_PACKAGES; do
            if ! grep -q "^CONFIG_PACKAGE_${pkg}=y$" .config; then
              echo "::error::Required package not selected after defconfig: ${pkg}"
              MISSING=1
            fi
          done
          [ "$MISSING" = "0" ]

          OPTIONAL_PACKAGES="
          luci-i18n-base-zh-cn
          luci-i18n-firewall-zh-cn
          luci-i18n-package-manager-zh-cn
          luci-i18n-ttyd-zh-cn
          luci-i18n-filemanager-zh-cn
          luci-i18n-passwall-zh-cn
          luci-i18n-nikki-zh-cn
          "
          for pkg in $OPTIONAL_PACKAGES; do
            if grep -q "^CONFIG_PACKAGE_${pkg}=y$" .config; then
              echo "Chinese language package selected after defconfig: ${pkg}"
            else
              echo "::warning::Chinese language package not selected after defconfig: ${pkg}. Continue building; boot-time fallback will try to install what is available."
            fi
          done

          echo "Final selected packages:"
          grep -E "CONFIG_PACKAGE_(luci|luci-ssl-openssl|luci-app-package-manager|luci-app-firewall|luci-app-ttyd|luci-app-filemanager|luci-app-passwall|luci-app-nikki|luci-i18n|nikki|xray-core|sing-box|chinadns-ng|dns2socks|tcping|v2ray-geodata|geoview|openssh-sftp-server|autocore|kmod-dummy|kmod-inet-diag|kmod-nft-socket|kmod-nft-tproxy|kmod-tun|kmod-igc|kmod-hwmon-k10temp|lm-sensors|irqbalance)=" .config || true
          grep -E "CONFIG_TARGET_(ROOTFS|KERNEL)_PARTSIZE=" .config || true

      - name: Download packages safe mode
        working-directory: immortalwrt
        run: |
          set -e
          make download -j"$(nproc)" || make download -j1 V=s || {
            echo "Download failed, removing tiny/broken files and retrying..."
            find dl -size -1024c -exec rm -f {} \; || true
            make download -j1 V=s
          }
          find dl -size -1024c -exec rm -f {} \; || true

      - name: Build firmware
        working-directory: immortalwrt
        run: |
          set -e
          make -j"$(nproc)" || make -j1 V=s

      - name: Check firmware output
        working-directory: immortalwrt
        run: |
          set -e
          echo "Firmware files:"
          find bin/targets/x86/64 -type f | sort
          test -n "$(find bin/targets/x86/64 -type f -name '*combined*.img.gz' -print -quit)"

          MANIFEST="$(find bin/targets/x86/64 -type f -name '*.manifest' -print -quit)"
          if [ -n "$MANIFEST" ]; then
            echo "Checking rootfs manifest: $MANIFEST"
            REQUIRED_IN_IMAGE="luci-app-nikki nikki luci-app-passwall"
            MISSING=0
            for pkg in $REQUIRED_IN_IMAGE; do
              if ! grep -q "^${pkg}[[:space:]]" "$MANIFEST"; then
                echo "::error::Package missing from final firmware manifest: ${pkg}"
                MISSING=1
              fi
            done
            [ "$MISSING" = "0" ]

            OPTIONAL_IN_IMAGE="
            luci-i18n-base-zh-cn
            luci-i18n-firewall-zh-cn
            luci-i18n-package-manager-zh-cn
            luci-i18n-ttyd-zh-cn
            luci-i18n-filemanager-zh-cn
            luci-i18n-passwall-zh-cn
            luci-i18n-nikki-zh-cn
            "
            for pkg in $OPTIONAL_IN_IMAGE; do
              if grep -q "^${pkg}[[:space:]]" "$MANIFEST"; then
                echo "Chinese language package is included in the final firmware: ${pkg}"
              else
                echo "::warning::Chinese language package is not in the final manifest: ${pkg}. Boot-time fallback will try to install what is available."
              fi
            done
          else
            echo "::warning::No manifest file found; cannot verify installed package list."
          fi

      - name: Upload firmware
        uses: actions/upload-artifact@v7
        with:
          name: immortalwrt-x86_64-r3-4300u-passwall-nikki-kmoddummy
          path: |
            immortalwrt/bin/targets/x86/64/*combined*.img.gz
            immortalwrt/bin/targets/x86/64/*rootfs*.img.gz
            immortalwrt/bin/targets/x86/64/*.manifest
            immortalwrt/bin/targets/x86/64/sha256sums
          if-no-files-found: error
          compression-level: 0
