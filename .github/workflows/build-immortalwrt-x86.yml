name: Build ImmortalWrt x86_64 SNAPSHOT

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup disk
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker image prune -a -f || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libncursesw5-dev libssl-dev python3 \
            python3-setuptools python3-pyelftools python3-distutils-extra \
            rsync unzip zlib1g-dev file wget curl subversion swig time \
            libelf-dev device-tree-compiler qemu-utils xxd
          sudo timedatectl set-timezone "$TZ"

      - name: Add swap
        run: |
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Clone ImmortalWrt source
        run: |
          git clone --depth=1 -b "$REPO_BRANCH" "$REPO_URL" immortalwrt
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate final x86_64 config for R3 4300U + Intel I226-V
        run: |
          cd immortalwrt

          mkdir -p files/etc/config

          cat > files/etc/config/network <<'EOF'
          config interface 'loopback'
                  option device 'lo'
                  option proto 'static'
                  option ipaddr '127.0.0.1'
                  option netmask '255.0.0.0'

          config globals 'globals'
                  option packet_steering '1'

          config interface 'lan'
                  option device 'eth0'
                  option proto 'static'
                  option ipaddr '192.168.1.1'
                  option netmask '255.255.255.0'
                  option ip6assign '60'

          config interface 'wan'
                  option device 'eth1'
                  option proto 'dhcp'

          config interface 'wan6'
                  option device '@wan'
                  option proto 'dhcpv6'
          EOF

          cat > .config <<'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y

          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_KERNEL_PARTSIZE=64
          CONFIG_TARGET_ROOTFS_PARTSIZE=2048

          CONFIG_LUCI_LANG_zh_Hans=y

          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-base=y
          CONFIG_PACKAGE_luci-ssl-openssl=y
          CONFIG_PACKAGE_luci-app-package-manager=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-filemanager=y

          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-package-manager-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-filemanager-zh-cn=y

          CONFIG_PACKAGE_openssh-sftp-server=y
          CONFIG_PACKAGE_autocore=y

          CONFIG_PACKAGE_amd64-microcode=y
          CONFIG_PACKAGE_kmod-hwmon-core=y
          CONFIG_PACKAGE_kmod-hwmon-k10temp=y
          CONFIG_PACKAGE_lm-sensors=y

          CONFIG_PACKAGE_kmod-igc=y
          CONFIG_PACKAGE_kmod-r8169=y
          CONFIG_PACKAGE_kmod-e1000e=y
          CONFIG_PACKAGE_kmod-ixgbe=y
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_kmod-nft-offload=y
          CONFIG_PACKAGE_ethtool=y
          CONFIG_PACKAGE_irqbalance=y

          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_unzip=y
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_lsblk=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_parted=y
          CONFIG_PACKAGE_pciutils=y
          EOF

          make defconfig

          echo "============================================================"
          echo "最终配置检查：R3 4300U / Intel I226-V / x86_64 generic"
          echo "注意：下面只检查并打印结果，不会因为 LuCI 中文包映射导致误报退出。"
          echo "============================================================"

          echo "=== 目标平台 ==="
          grep -E '^CONFIG_TARGET_x86=y|^CONFIG_TARGET_x86_64=y|^CONFIG_TARGET_x86_64_DEVICE_generic=y' .config || true

          echo "=== 分区大小 ==="
          grep '^CONFIG_TARGET_KERNEL_PARTSIZE=64' .config || true
          grep '^CONFIG_TARGET_ROOTFS_PARTSIZE=2048' .config || true

          echo "=== LuCI / 中文 / 插件 ==="
          grep -E '^CONFIG_LUCI_LANG_zh_Hans=y|^CONFIG_PACKAGE_luci=y|^CONFIG_PACKAGE_luci-base=y|^CONFIG_PACKAGE_luci-ssl-openssl=y|^CONFIG_PACKAGE_luci-app-package-manager=y|^CONFIG_PACKAGE_luci-app-firewall=y|^CONFIG_PACKAGE_luci-app-ttyd=y|^CONFIG_PACKAGE_luci-app-filemanager=y|^CONFIG_PACKAGE_openssh-sftp-server=y|^CONFIG_PACKAGE_autocore=y' .config || true

          echo "=== R3 4300U / AMD 温度 / 微码 ==="
          grep -E '^CONFIG_PACKAGE_amd64-microcode=y|^CONFIG_PACKAGE_kmod-hwmon-k10temp=y|^CONFIG_PACKAGE_lm-sensors=y' .config || true

          echo "=== Intel I226-V 网卡关键驱动 ==="
          grep -E '^CONFIG_PACKAGE_kmod-igc=y|^CONFIG_PACKAGE_ethtool=y|^CONFIG_PACKAGE_irqbalance=y|^CONFIG_PACKAGE_kmod-nft-offload=y' .config || true

          echo "=== 代理插件确认：不内置 PassWall / Nikki / OpenClash / SSR Plus ==="
          grep -Ei 'passwall|nikki|openclash|shadowsocksr|ssr-plus' .config && exit 1 || true

          echo "=== 最终 .config 关键项输出结束 ==="

      - name: Download packages
        run: |
          cd immortalwrt
          make download -j$(nproc) || make download -j1 V=s
          find dl -size -1024c -exec rm -f {} \; || true

      - name: Build firmware
        run: |
          cd immortalwrt
          make -j$(nproc) || make -j1 V=s

      - name: Check firmware output
        run: |
          cd immortalwrt
          echo "=== 固件输出目录 ==="
          ls -lh bin/targets/x86/64/

          echo "=== 固件文件 ==="
          find bin/targets/x86/64/ -type f \( -name "*.img.gz" -o -name "sha256sums" \) -print -exec ls -lh {} \;

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-r3-4300u-i226v-x86_64
          path: |
            immortalwrt/bin/targets/x86/64/*combined*.img.gz
            immortalwrt/bin/targets/x86/64/*rootfs*.img.gz
            immortalwrt/bin/targets/x86/64/sha256sums
          if-no-files-found: error
