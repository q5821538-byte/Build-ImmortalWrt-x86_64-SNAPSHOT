name: Build ImmortalWrt x86_64 SNAPSHOT R3-4300U

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cleanup disk
        run: |
          set -e
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          docker system prune -a -f || true
          df -h

      - name: Install dependencies
        run: |
          set -e
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3 python3-setuptools \
            rsync swig unzip zlib1g-dev file wget curl libelf-dev \
            libtool automake autoconf autopoint pkg-config ccache

      - name: Add swap safe mode
        run: |
          # Swap is helpful for full source compile, but this step must never stop the build.
          set +e

          echo "Swap before:"
          swapon --show || true
          free -h || true
          df -h / /mnt || true

          SWAPFILE="/mnt/swapfile-${GITHUB_RUN_ID}"

          sudo swapoff "$SWAPFILE" 2>/dev/null || true
          sudo rm -f "$SWAPFILE" || true

          echo "Creating swap at $SWAPFILE"
          sudo fallocate -l 8G "$SWAPFILE"
          FALL_RESULT=$?

          if [ "$FALL_RESULT" -ne 0 ]; then
            echo "fallocate failed, trying dd fallback"
            sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=8192 status=progress
          fi

          if [ -f "$SWAPFILE" ]; then
            sudo chmod 600 "$SWAPFILE" || true
            sudo mkswap "$SWAPFILE" || true
            sudo swapon "$SWAPFILE" || true
          fi

          echo "Swap after:"
          swapon --show || true
          free -h || true

          # Do not fail the workflow because of swap.
          exit 0

      - name: Clone ImmortalWrt source
        run: |
          set -e
          git clone --depth=1 -b "$REPO_BRANCH" "$REPO_URL" immortalwrt

      - name: Update and install feeds safe mode
        working-directory: immortalwrt
        run: |
          set -e

          git config --global http.version HTTP/1.1 || true
          git config --global http.postBuffer 524288000 || true

          retry() {
            local max=3
            local n=1
            until "$@"; do
              if [ "$n" -ge "$max" ]; then
                echo "Command failed after $max attempts: $*"
                return 1
              fi
              echo "Command failed: $*"
              echo "Retrying in $((n * 20)) seconds..."
              sleep $((n * 20))
              n=$((n + 1))
            done
          }

          echo "Updating feeds..."
          retry ./scripts/feeds update -a || {
            echo "Feeds update failed, cleaning feed cache and retrying once..."
            ./scripts/feeds clean || true
            rm -rf tmp/feeds* tmp/info/.files-* || true
            ./scripts/feeds update -a
          }

          echo "Installing feeds..."
          retry ./scripts/feeds install -a || {
            echo "Feeds install failed, cleaning feed cache and retrying once..."
            rm -rf tmp/feeds* tmp/info/.files-* || true
            ./scripts/feeds update -a
            ./scripts/feeds install -a
          }

      - name: Generate final x86_64 config for R3 4300U
        working-directory: immortalwrt
        run: |
          set -e

          mkdir -p files/etc/config
          mkdir -p files/etc/uci-defaults
          mkdir -p files/etc/sysctl.d

          cat > files/etc/config/network <<'EOF'
          config interface 'loopback'
                  option device 'lo'
                  option proto 'static'
                  option ipaddr '127.0.0.1'
                  option netmask '255.0.0.0'

          config globals 'globals'

          config device
                  option name 'br-lan'
                  option type 'bridge'
                  list ports 'eth0'

          config interface 'lan'
                  option device 'br-lan'
                  option proto 'static'
                  option ipaddr '192.168.1.1'
                  option netmask '255.255.255.0'
                  option ip6assign '60'

          config interface 'wan'
                  option device 'eth1'
                  option proto 'dhcp'

          config interface 'wan6'
                  option device 'eth1'
                  option proto 'dhcpv6'
          EOF

          sed -i 's/^          //' files/etc/config/network

          cat > files/etc/uci-defaults/99-r3-4300u-defaults <<'EOF'
          #!/bin/sh

          uci -q batch <<'UCI'
          set system.@system[0].hostname='ImmortalWrt'
          set system.@system[0].zonename='Asia/Shanghai'
          set system.@system[0].timezone='CST-8'
          commit system

          set network.lan.device='br-lan'
          set network.wan.device='eth1'
          set network.wan.proto='dhcp'
          set network.wan6.device='eth1'
          set network.wan6.proto='dhcpv6'
          commit network

          set firewall.@defaults[0].flow_offloading='1'
          set firewall.@defaults[0].flow_offloading_hw='1'
          commit firewall
          UCI

          uci -q get luci.main >/dev/null 2>&1 || uci set luci.main='core'
          uci -q set luci.main.lang='zh_cn'
          uci -q commit luci

          exit 0
          EOF

          sed -i 's/^          //' files/etc/uci-defaults/99-r3-4300u-defaults
          chmod +x files/etc/uci-defaults/99-r3-4300u-defaults

          cat > files/etc/sysctl.d/99-r3-4300u.conf <<'EOF'
          net.core.default_qdisc=fq_codel
          EOF
          sed -i 's/^          //' files/etc/sysctl.d/99-r3-4300u.conf

          cat > .config <<'EOF'
          CONFIG_TARGET_x86=y
          CONFIG_TARGET_x86_64=y
          CONFIG_TARGET_x86_64_DEVICE_generic=y

          CONFIG_GRUB_IMAGES=y
          CONFIG_GRUB_EFI_IMAGES=y
          CONFIG_TARGET_IMAGES_GZIP=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_TARGET_ROOTFS_PARTSIZE=512
          CONFIG_TARGET_KERNEL_PARTSIZE=64

          # LuCI + 中文 + 常用管理
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl-openssl=y
          CONFIG_PACKAGE_luci-app-package-manager=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-filemanager=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-package-manager-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-filemanager-zh-cn=y
          CONFIG_PACKAGE_openssh-sftp-server=y

          # R3 4300U / x86_64 / I226-V
          CONFIG_PACKAGE_kmod-igc=y
          CONFIG_PACKAGE_ethtool=y
          CONFIG_PACKAGE_pciutils=y
          CONFIG_PACKAGE_irqbalance=y

          # autocore + 温度传感器
          CONFIG_PACKAGE_autocore=y
          CONFIG_PACKAGE_lm-sensors=y
          CONFIG_PACKAGE_kmod-hwmon-k10temp=y

          # 文件系统和磁盘工具
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_lsblk=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_parted=y

          # 明确不要代理插件
          # CONFIG_PACKAGE_luci-app-openclash is not set
          # CONFIG_PACKAGE_luci-app-passwall is not set
          # CONFIG_PACKAGE_luci-app-passwall2 is not set
          # CONFIG_PACKAGE_luci-app-ssr-plus is not set
          # CONFIG_PACKAGE_luci-app-nikki is not set
          EOF

          sed -i 's/^          //' .config

          make defconfig

          echo "Final selected packages:"
          grep -E "CONFIG_PACKAGE_(luci|luci-ssl-openssl|luci-app-package-manager|luci-app-firewall|luci-app-ttyd|luci-app-filemanager|luci-i18n|openssh-sftp-server|autocore|kmod-igc|kmod-hwmon-k10temp|lm-sensors|irqbalance)=" .config || true

      - name: Download packages safe mode
        working-directory: immortalwrt
        run: |
          set -e

          make download -j"$(nproc)" || make download -j1 V=s || {
            echo "Download failed, removing tiny/broken files and retrying..."
            find dl -size -1024c -exec rm -f {} \; || true
            make download -j1 V=s
          }

          find dl -size -1024c -exec rm -f {} \; || true

      - name: Build firmware
        working-directory: immortalwrt
        run: |
          set -e
          make -j"$(nproc)" || make -j1 V=s

      - name: Check firmware output
        working-directory: immortalwrt
        run: |
          set -e
          echo "Firmware files:"
          find bin/targets/x86/64 -type f | sort

          test -n "$(find bin/targets/x86/64 -type f -name '*combined*.img.gz' -print -quit)"

      - name: Upload firmware
        uses: actions/upload-artifact@v6
        with:
          name: immortalwrt-x86_64-r3-4300u
          path: |
            immortalwrt/bin/targets/x86/64/*combined*.img.gz
            immortalwrt/bin/targets/x86/64/*rootfs*.img.gz
            immortalwrt/bin/targets/x86/64/sha256sums
          if-no-files-found: error
